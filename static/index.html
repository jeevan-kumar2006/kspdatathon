<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KSP Crime Intelligence Platform</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script>
tailwind.config={theme:{extend:{colors:{bg:{DEFAULT:'#050505',card:'#0E0E0E'},accent:{DEFAULT:'#FF6B00',dim:'rgba(255,107,0,0.15)',glow:'rgba(255,107,0,0.4)'},silver:'#A0A0A0',danger:'#FF2D2D',success:'#00E676',warning:'#FFD600'},fontFamily:{display:['"Bebas Neue"','sans-serif'],body:['"Barlow Condensed"','sans-serif']}}}}
</script>
<link rel="stylesheet" href="/static/styles.css">
</head>
<body class="flex min-h-screen">

<div id="fallbackBadge" class="fallback-badge"><i class="fa-solid fa-database mr-1"></i>FALLBACK MODE — backend unavailable</div>

<!-- Sidebar -->
<aside class="fixed left-0 top-0 bottom-0 w-14 bg-bg-card border-r border-[#1a1a1a] flex flex-col items-center py-3 z-50" role="navigation" aria-label="Main navigation">
  <div class="w-9 h-9 rounded flex items-center justify-center bg-accent-dim mb-6"><i class="fa-solid fa-shield-halved text-accent text-sm"></i></div>
  <nav class="flex flex-col gap-1 flex-1">
    <button class="sidebar-btn active w-10 h-10 flex items-center justify-center rounded text-xs" data-section="overview" title="Overview"><i class="fa-solid fa-grid-2"></i></button>
    <button class="sidebar-btn w-10 h-10 flex items-center justify-center rounded text-xs text-silver" data-section="map" title="Map"><i class="fa-solid fa-map-location-dot"></i></button>
    <button class="sidebar-btn w-10 h-10 flex items-center justify-center rounded text-xs text-silver" data-section="network" title="Network"><i class="fa-solid fa-diagram-project"></i></button>
    <button class="sidebar-btn w-10 h-10 flex items-center justify-center rounded text-xs text-silver" data-section="predict" title="Predictions"><i class="fa-solid fa-chart-line"></i></button>
    <button class="sidebar-btn w-10 h-10 flex items-center justify-center rounded text-xs text-silver" data-section="offenders" title="Offenders"><i class="fa-solid fa-user-secret"></i></button>
  </nav>
</aside>

<!-- Main -->
<main class="ml-14 flex-1 min-h-screen">

  <!-- Header -->
  <header class="sticky top-0 z-40 bg-[#050505ee] backdrop-blur border-b border-[#1a1a1a] px-4 py-2 flex items-center gap-3 scan-line">
    <!-- Hamburger -->
    <div class="relative shrink-0">
      <div id="hamburger" class="hamburger" role="button" tabindex="0" aria-label="Menu">
        <span></span><span></span><span></span>
      </div>
      <div id="hamburgerDropdown" class="hamburger-dropdown">
        <button onclick="document.querySelector('#hamburger').click()"><i class="fa-solid fa-gauge-high"></i> Dashboard</button>
        <button id="btnAdvViz"><i class="fa-solid fa-crosshairs"></i> Advanced Visualization</button>
        <button onclick="state.map&&state.map.fullscreen&&state.map.fullscreen.toggle()"><i class="fa-solid fa-expand"></i> Fullscreen Map</button>
        <div class="divider"></div>
        <button onclick="AdvViz.toggle()"><i class="fa-solid fa-layer-group"></i> Toggle Red-Zone Alerts</button>
        <button onclick="AdvViz.setTimeFilter(-1)"><i class="fa-solid fa-clock"></i> Reset Time Filter</button>
      </div>
    </div>
    <!-- Logo -->
    <div class="flex items-center gap-2.5 mr-3 shrink-0">
      <i class="fa-solid fa-shield-halved text-accent text-lg"></i>
      <div>
        <h1 class="font-display text-xl leading-none tracking-wider text-white">CRIME INTELLIGENCE PLATFORM</h1>
        <p class="text-[10px] text-silver tracking-widest uppercase">Karnataka State Police — SCRB</p>
      </div>
    </div>
    <!-- Search -->
    <div class="relative w-52 shrink-0" id="searchWrap">
      <div class="flex items-center bg-[#0d0d0d] border border-[#222] rounded px-2.5 py-1.5 focus-within:border-accent transition">
        <i class="fa-solid fa-magnifying-glass text-[#444] text-xs mr-1.5"></i>
        <input id="searchInput" type="text" placeholder="Search (Nominatim)" class="bg-transparent text-xs text-white outline-none w-full placeholder-[#444]" autocomplete="off" aria-label="Search location">
      </div>
      <div id="searchResults" class="search-results hidden"></div>
    </div>
    <!-- Filters -->
    <select id="filterDistrict" class="bg-[#0d0d0d] border border-[#222] text-xs text-silver px-2 py-1.5 rounded focus:border-accent focus:outline-none" aria-label="District"><option value="">All Districts</option></select>
    <select id="filterCrime" class="bg-[#0d0d0d] border border-[#222] text-xs text-silver px-2 py-1.5 rounded focus:border-accent focus:outline-none" aria-label="Crime type"><option value="">All Crime Types</option></select>
    <!-- Weather -->
    <div id="weatherBar" class="flex gap-1.5 ml-auto overflow-x-auto shrink-0"><span class="text-[10px] text-[#444] self-center mr-1"><i class="fa-solid fa-cloud-sun mr-1"></i>LIVE</span></div>
    <!-- Refresh -->
    <button id="btnRefresh" class="shrink-0 bg-accent text-black font-body font-semibold text-xs px-3 py-1.5
